  fetch_trending_videos:
    name: Fetch trending videos
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '30 11 * * *' }}
    continue-on-error: true
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    env:
      REGION_CODES: "PE,MX,AR,CO,CL,ES,US,GB,IN,BR,PT"
      ALLOWED_LANGS: "es,en,hi,pt"
      LONG_MIN_SECONDS: 180
      MAX_SHORTS_PER_DAY: 20
      MAX_LONGS_PER_DAY: 15
      PAGES_PER_REGION: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run fetch_trending_videos.py with retry
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 20
          command: python ./scripts/fetch_trending_videos.py
        env:
          YOUTUBE_API_KEY:     ${{ secrets.YOUTUBE_API_KEY }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CHANNEL_ID:          ${{ secrets.CHANNEL_ID }}

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: trending-report
          path: ./trending_report_*.md

