# .github/workflows/cron.yml
name: YouTube → Supabase pipeline

concurrency:
  group: cron-${{ github.ref }}
  cancel-in-progress: true

env:
  THUMB_OBJECTS_ENABLED: ${{ vars.THUMB_OBJECTS_ENABLED || 'false' }}
  THUMB_OCR_ENABLED: ${{ vars.THUMB_OCR_ENABLED || 'false' }}
  NICHES_EMBEDDING_ENABLED: ${{ vars.NICHES_EMBEDDING_ENABLED || 'false' }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 7 * * *"      # import_daily (07:00 UTC)
    - cron: "15 7 * * *"     # import_captions (07:15 UTC)
    - cron: "30 7 * * *"     # import_recent_comments (07:30 UTC)
    - cron: "45 7 * * *"     # reconcile_comments (07:45 UTC)
    - cron: "0 8 * * *"      # fetch_comment_sentiment (08:00 UTC)
    - cron: "0 9 * * *"      # maint_metrics (09:00 UTC)
    - cron: "0 10 * * *"     # fetch_video_analytics (10:00 UTC)
    - cron: "30 10 * * *"    # compute_posting_schedule (10:30 UTC)
    - cron: "0 11 * * *"     # fetch_monetization_metrics (11:00 UTC)
    - cron: "30 11 * * *"    # fetch_trending_videos (11:30 UTC)
    - cron: "45 11 * * *"    # fetch_search_trends (11:45 UTC)
    - cron: "0 14 1,16 * *"  # fetch_youtube_policies (14:00 UTC, días 1 y 16)
    - cron: "55 4 * * *"     # purge_buffer (04:55 UTC)
    - cron: "45 10 * * 0"    # build_channel_profile (domingos 10:45 UTC)

jobs:
  import_daily:
    name: Import daily videos
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '0 7 * * *' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install system dependencies (OCR/OpenCV)
        if: ${{ env.THUMB_OCR_ENABLED == 'true' || env.THUMB_OBJECTS_ENABLED == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libgl1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run import_daily.py with retry
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: python ./scripts/import_daily.py
        env:
          YT_CLIENT_ID:         ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:     ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:     ${{ secrets.YT_REFRESH_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DAILY_VIDEO_BATCH:    ${{ secrets.DAILY_VIDEO_BATCH }}
          CHANNEL_ID:           ${{ secrets.CHANNEL_ID }}
          ENABLE_THUMBNAIL_OCR: "true"

      - name: Notify failure by email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow failed 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Revisa los logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  import_captions:
    name: Import captions
    runs-on: ubuntu-latest
    needs: import_daily
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '15 7 * * *' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run import_captions.py with retry
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: python ./scripts/import_captions.py
        env:
          YT_CLIENT_ID:         ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:     ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:     ${{ secrets.YT_REFRESH_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Notify failure by email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow failed 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  convert_captions_to_script:
    name: Convert captions to script
    runs-on: ubuntu-latest
    needs: import_captions
    if: false
    continue-on-error: true
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run convert_captions_to_script.py
        run: echo "disabled for now"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SCRIPT_LANG: 'es'
          SCRIPT_MAX_PER_RUN: '20'
          SCRIPT_ORTHO_ENABLED: 'true'
          SCRIPT_DRY_RUN: 'false'

      - name: Upload script report
        uses: actions/upload-artifact@v4
        with:
          name: script-report
          path: ./scripts_report_*.md

      - name: Notify failure by email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow failed 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  import_recent_comments:
    name: Import recent comments
    runs-on: ubuntu-latest
    needs: convert_captions_to_script
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '30 7 * * *' }}
    defaults:
