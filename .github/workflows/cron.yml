          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MAX_VIDEOS_PER_RUN:   ${{ secrets.MAX_VIDEOS_PER_RUN || '50' }}
          MAX_COMMENTS_PER_VIDEO: ${{ secrets.MAX_COMMENTS_PER_VIDEO || '500' }}

      - name: Notify failure by email
