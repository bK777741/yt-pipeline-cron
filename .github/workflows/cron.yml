          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow failed 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  reconcile_comments:
    name: Reconcile comments
    runs-on: ubuntu-latest
    needs: import_recent_comments
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '45 7 * * *' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
