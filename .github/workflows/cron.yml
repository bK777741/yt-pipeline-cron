          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  fetch_comment_sentiment:
    name: Analyze comment sentiment
    runs-on: ubuntu-latest
    needs: reconcile_comments
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '0 8 * * *' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install nltk==3.8.1
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Run fetch_comment_sentiment.py with retry
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: python ./scripts/fetch_comment_sentiment.py
