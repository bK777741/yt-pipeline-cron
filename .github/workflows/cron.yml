# .github/workflows/cron.yml
name: YouTube → Supabase pipeline

concurrency:
  group: cron-${{ github.ref }}
  cancel-in-progress: true

env:
  THUMB_OBJECTS_ENABLED: ${{ vars.THUMB_OBJECTS_ENABLED || 'false' }}
  THUMB_OCR_ENABLED: ${{ vars.THUMB_OCR_ENABLED || 'false' }}
  NICHES_EMBEDDING_ENABLED: ${{ vars.NICHES_EMBEDDING_ENABLED || 'false' }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 7 * * *"      # import_daily (07:00 UTC)
    - cron: "15 7 * * *"     # import_captions (07:15 UTC)
    - cron: "30 7 * * *"     # import_recent_comments (07:30 UTC)
    - cron: "45 7 * * *"     # reconcile_comments (07:45 UTC)
    - cron: "0 8 * * *"      # fetch_comment_sentiment (08:00 UTC)
    - cron: "0 9 * * *"      # maint_metrics (09:00 UTC)
    - cron: "0 10 * * *"     # fetch_video_analytics (10:00 UTC)
    - cron: "30 10 * * *"    # compute_posting_schedule (10:30 UTC)
    - cron: "0 11 * * *"     # fetch_monetization_metrics (11:00 UTC)
    - cron: "30 11 * * *"    # fetch_trending_videos (11:30 UTC)
    - cron: "45 11 * * *"    # fetch_search_trends (11:45 UTC)
    - cron: "0 14 1,16 * *"  # fetch_youtube_policies (14:00 UTC, días 1 y 16)
    - cron: "55 4 * * *"     # purge_buffer (04:55 UTC)
    - cron: "45 10 * * 0"    # build_channel_profile (domingos 10:45 UTC)

jobs:
  import_daily:
    name: Import daily videos
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '0 7 * * *' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install system dependencies (OCR/OpenCV)
        if: ${{ env.THUMB_OCR_ENABLED == 'true' || env.THUMB_OBJECTS_ENABLED == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libgl1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run import_daily.py with retry
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ./scripts/import_daily.py
        env:
          YT_CLIENT_ID:         ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:     ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:     ${{ secrets.YT_REFRESH_TOKEN }}
          SUPABASE_URL_RAW:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DAILY_VIDEO_BATCH:    ${{ secrets.DAILY_VIDEO_BATCH }}
          CHANNEL_ID:           ${{ secrets.CHANNEL_ID }}
          ENABLE_THUMBNAIL_OCR: "true"

      - name: Notify failure by email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow failed 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Revisa los logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  import_captions:
    name: Import captions
    runs-on: ubuntu-latest
    needs: import_daily
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '15 7 * * *' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run import_captions.py with retry
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ./scripts/import_captions.py
        env:
          YT_CLIENT_ID:         ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:     ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:     ${{ secrets.YT_REFRESH_TOKEN }}
          SUPABASE_URL_RAW:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Notify failure by email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow failed 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  convert_captions_to_script:
    name: Convert captions to script
    runs-on: ubuntu-latest
    needs: import_captions
    if: ${{ needs.import_captions.result == 'success' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python ./scripts/convert_captions_to_script.py

  import_recent_comments:
    name: Import recent comments
    runs-on: ubuntu-latest
    needs: import_daily
    if: ${{ needs.import_daily.result == 'success' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - name: Run import_recent_comments.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          MAX_VIDEOS_PER_RUN: 50
          MAX_COMMENTS_PER_VIDEO: 500
        run: python ./scripts/import_recent_comments.py

  reconcile_comments:
    name: Reconcile comments
    runs-on: ubuntu-latest
    needs: import_recent_comments
    if: ${{ needs.import_recent_comments.result == 'success' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - name: Reconcile comments
        run: python ./scripts/reconcile_comments.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}

  fetch_comment_sentiment:
    name: Analyze comment sentiment
    runs-on: ubuntu-latest
    needs: reconcile_comments
    if: ${{ needs.reconcile_comments.result == 'success' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python ./scripts/fetch_comment_sentiment.py

  maint_metrics:
    name: Maintain metrics
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '0 9 * * *' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run maint_metrics.py with retry
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ./scripts/maint_metrics.py
        env:
          YT_CLIENT_ID:         ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:     ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:     ${{ secrets.YT_REFRESH_TOKEN }}
          SUPABASE_URL_RAW:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Notify failure by email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow failed 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  fetch_video_analytics:
    name: Fetch video analytics
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '0 10 * * *' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run fetch_video_analytics.py with retry
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ./scripts/fetch_video_analytics.py
        env:
          YT_CLIENT_ID:         ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:     ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:     ${{ secrets.YT_REFRESH_TOKEN }}
          SUPABASE_URL_RAW:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Notify failure by email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow failed 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  compute_posting_schedule:
    name: Compute posting schedule
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '30 10 * * *' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run compute_posting_schedule.py with retry
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ./scripts/compute_posting_schedule.py
        env:
          SUPABASE_URL_RAW:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Notify failure by email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow failed 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  fetch_monetization_metrics:
    name: Fetch monetization metrics
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '0 11 * * *' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run fetch_monetization_metrics.py with retry
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ./scripts/fetch_monetization_metrics.py
        env:
          YT_CLIENT_ID:         ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:     ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:     ${{ secrets.YT_REFRESH_TOKEN }}
          SUPABASE_URL_RAW:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Notify failure by email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow failed 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  fetch_trending_videos:
    name: Fetch trending videos
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '30 11 * * *' }}
    continue-on-error: true
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    env:
      REGION_CODES: "PE,MX,AR,CO,CL,ES,US,GB,IN,BR,PT"
      ALLOWED_LANGS: "es,en,hi,pt"
      LONG_MIN_SECONDS: 180
      MAX_SHORTS_PER_DAY: 20
      MAX_LONGS_PER_DAY: 15
      PAGES_PER_REGION: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run fetch_trending_videos.py with retry
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 20
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ./scripts/fetch_trending_videos.py
        env:
          YOUTUBE_API_KEY:     ${{ secrets.YOUTUBE_API_KEY }}
          SUPABASE_URL_RAW:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CHANNEL_ID:          ${{ secrets.CHANNEL_ID }}

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: trending-report
          path: ./trending_report_*.md

      - name: Notify failure by email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow failed 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  fetch_search_trends:
    name: Fetch search trends
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '45 11 * * *' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Install pytrends
        run: pip install pytrends
      - name: Run fetch_search_trends.py with retry
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ./scripts/fetch_search_trends.py
        env:
          YT_CLIENT_ID:         ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:     ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:     ${{ secrets.YT_REFRESH_TOKEN }}
          SUPABASE_URL_RAW:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CHANNEL_NAME:         ${{ secrets.CHANNEL_NAME }}

      - name: Notify failure by email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow failed 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  fetch_youtube_policies:
    name: Fetch YouTube policies
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' && github.event.schedule == '0 14 1,16 * *' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run fetch_youtube_policies.py with retry
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ./scripts/fetch_youtube_policies.py
        env:
          SUPABASE_URL_RAW:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CONTACT_EMAIL:        "jvillarreal0991@gmail.com"
          POLICY_URLS:          ${{ secrets.POLICY_URLS }}
          POLICY_MAX_CHARS:     "12000"
      
      - name: Notify failure by email
        if: ${{ failure() && env.ALERT_EMAIL != '' }}
        env:
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow failed 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ env.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  purge_buffer:
    name: Purge buffer
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' && github.event.schedule == '55 4 * * *' }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run purge_buffer.py with retry
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 10
          command: |
            set -euo pipefail
