  export_sync_watermarks:
    name: "MANTENIMIENTO: Exportar Sync Watermarks"
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Probe Supabase REST (must be 200/204)
        if: always()
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -euo pipefail
          BASE="$(printf '%s' "$SB_URL" | tr -d '\r\n ' | sed 's:/*$::')"
          URL="$BASE/rest/v1/?select=1"
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "apikey: $SB_KEY" \
            -H "Authorization: Bearer $SB_KEY" \
            "$URL")
          echo "HTTP: $code"
          [ "$code" = 200 ] || [ "$code" = 204 ]
      - name: Debug Supabase key role (safe)
        env:
          SB_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python - <<'PY'
          import os, json, base64
          key=os.environ["SB_KEY"]
          parts=key.split('.')
          payload = json.loads(base64.urlsafe_b64decode(parts[1] + '='*((4-len(parts[1])%4)%4)).decode())
          print("role:", payload.get("role"))
          PY
      - name: Ejecutar export_sync_watermarks.py
        env:
          SUPABASE_URL_RAW: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -euo pipefail
          export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
          export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
          python ./scripts/export_sync_watermarks.py

  # =====================================================================================
  # MÓDULO AUTO-NICHO: PASO 1 - CONSTRUIR PERFIL
  # =====================================================================================
  build_niche_profile:
    name: "Auto-Nicho: Construir Perfil del Canal"
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '0 5 * * *' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Cache models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/torch
            ~/.cache/huggingface
            ~/.cache/sentence-transformers
          key: ${{ runner.os }}-model-cache-${{ hashFiles('requirements.txt') }}-v2
      - name: Instalar dependencias (incluyendo ML)
        run: pip install -r requirements.txt
      - name: Ejecutar script de construcción de perfil
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NICHES_TOP_N_VIDEOS: 150
        run: python scripts/build_niche_profile.py

  # =====================================================================================
  # MÓDULO AUTO-NICHO: PASO 2 - ESCANEAR COMPETENCIA
  # =====================================================================================
  scan_competencia_auto_nicho:
    name: "Auto-Nicho: Escanear Competencia"
    runs-on: ubuntu-latest
    needs: build_niche_profile
    if: >
      needs.build_niche_profile.result == 'success' &&
      (github.event_name != 'schedule' ||
      github.event.schedule == '0 6 * * *' ||
      github.event.schedule == '0 13 * * *' ||
      github.event.schedule == '0 21 * * *')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Cache models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/torch
            ~/.cache/huggingface
            ~/.cache/sentence-transformers
          key: ${{ runner.os }}-model-cache-${{ hashFiles('requirements.txt') }}-v2
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Ejecutar script de escaneo
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # --- Configuración de Auto-Nicho ---
          AUTO_NICHO_SHADOW: ${{ vars.AUTO_NICHO_SHADOW || 'true' }}
          TH_SHORTS: ${{ vars.TH_SHORTS || 0.65 }}
          TH_LONGS: ${{ vars.TH_LONGS || 0.70 }}
          TH_MIN: ${{ vars.TH_MIN || 0.58 }}
          TARGET_SHORTS: ${{ vars.TARGET_SHORTS || 15 }}
          TARGET_LONGS: ${{ vars.TARGET_LONGS || 10 }}
        run: python scripts/scan_competencia_auto_nicho.py
