# .github/workflows/cron.yml
name: YouTube → Supabase pipeline

# ========= CONFIGURACIÓN GLOBAL DEL WORKFLOW =========
concurrency:
  group: cron-${{ github.ref }}
  cancel-in-progress: true

env:
  THUMB_OBJECTS_ENABLED: ${{ vars.THUMB_OBJECTS_ENABLED || 'false' }}
  THUMB_OCR_ENABLED: ${{ vars.THUMB_OCR_ENABLED || 'false' }}
  NICHES_EMBEDDING_ENABLED: ${{ vars.NICHES_EMBEDDING_ENABLED || 'false' }}

# ========= DISPARADORES (TRIGGERS) DEL WORKFLOW =========
on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # Schedules para jobs originales
    - cron: "0 7 * * *"      # import_daily
    - cron: "15 7 * * *"     # import_captions
    - cron: "30 7 * * *"     # import_recent_comments
    - cron: "45 7 * * *"     # reconcile_comments
    - cron: "0 8 * * *"      # fetch_comment_sentiment
    - cron: "0 9 * * *"      # maint_metrics
    - cron: "0 10 * * *"     # fetch_video_analytics
    - cron: "30 10 * * *"    # compute_posting_schedule
    - cron: "0 11 * * *"     # fetch_monetization_metrics
    - cron: "30 11 * * *"    # fetch_trending_videos
    - cron: "45 11 * * *"    # fetch_search_trends
    - cron: "0 14 1,16 * *"  # fetch_youtube_policies
    - cron: "55 4 * * *"     # purge_buffer

    # Schedules para el NUEVO MÓDULO AUTO-NICHO
    - cron: "0 5 * * *"      # build_niche_profile (una vez al día, temprano)
    - cron: "0 6 * * *"      # scan_competencia_auto_nicho (ronda mañana)
    - cron: "0 13 * * *"     # scan_competencia_auto_nicho (ronda mediodía)
    - cron: "0 21 * * *"     # scan_competencia_auto_nicho (ronda noche)

jobs:
  # =====================================================================================
  # PASO 1: IMPORTACIÓN DE DATOS INICIAL (BLOQUE CRÍTICO)
  # =====================================================================================
  import_daily:
    name: "PASO 1: Importar Videos Diarios (Crítico)"
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '0 7 * * *' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Instalar dependencias del sistema (OCR/OpenCV)
        if: ${{ vars.THUMB_OCR_ENABLED == 'true' || vars.THUMB_OBJECTS_ENABLED == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libgl1
      - name: Instalar dependencias de Python
        run: pip install -r requirements.txt
      - name: Ejecutar import_daily.py con reintentos
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ./scripts/import_daily.py
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          SUPABASE_URL_RAW: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DAILY_VIDEO_BATCH: ${{ secrets.DAILY_VIDEO_BATCH }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          ENABLE_THUMBNAIL_OCR: "true"
      - name: Notificar fallo por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow FAILED 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Revisa los logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # =====================================================================================
  # PASO 2 (PARALELO): PROCESAMIENTO DEPENDIENTE DE LA IMPORTACIÓN
  # =====================================================================================
  import_captions:
    name: "PASO 2a: Importar Subtítulos (Paralelo)"
    runs-on: ubuntu-latest
    needs: import_daily
    if: ${{ needs.import_daily.result == 'success' && (github.event_name != 'schedule' || github.event.schedule == '15 7 * * *') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Ejecutar import_captions.py con reintentos
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ./scripts/import_captions.py
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          SUPABASE_URL_RAW: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - name: Notificar fallo por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow FAILED 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  import_recent_comments:
    name: "PASO 2b: Importar Comentarios (Paralelo)"
    runs-on: ubuntu-latest
    needs: import_daily
    if: ${{ needs.import_daily.result == 'success' && (github.event_name != 'schedule' || github.event.schedule == '30 7 * * *') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - name: Ejecutar import_recent_comments.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          MAX_VIDEOS_PER_RUN: 50
          MAX_COMMENTS_PER_VIDEO: 500
        run: python ./scripts/import_recent_comments.py

  detect_thumbnail_objects:
    name: "PASO 2c: Detectar Objetos en Thumbnails (Paralelo)"
    runs-on: ubuntu-latest
    needs: import_daily
    if: ${{ vars.THUMB_OBJECTS_ENABLED == 'true' && needs.import_daily.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python ./scripts/detect_thumbnail_objects.py

  extract_thumbnail_text:
    name: "PASO 2d: Extraer Texto de Thumbnails (Paralelo)"
    runs-on: ubuntu-latest
    needs: import_daily
    if: ${{ vars.THUMB_OCR_ENABLED == 'true' && needs.import_daily.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python ./scripts/extract_thumbnail_text.py

  # =====================================================================================
  # PASO 3: PROCESAMIENTO SECUNDARIO (DEPENDENCIAS EN CADENA)
  # =====================================================================================
  convert_captions_to_script:
    name: "PASO 3a: Convertir Subtítulos a Guion"
    runs-on: ubuntu-latest
    needs: import_captions
    if: ${{ needs.import_captions.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python ./scripts/convert_captions_to_script.py

  reconcile_comments:
    name: "PASO 3b: Reconciliar Comentarios"
    runs-on: ubuntu-latest
    needs: import_recent_comments
    if: ${{ needs.import_recent_comments.result == 'success' && (github.event_name != 'schedule' || github.event.schedule == '45 7 * * *') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - name: Ejecutar reconcile_comments.py
        run: python ./scripts/reconcile_comments.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}

  # =====================================================================================
  # PASO 4: ANÁLISIS DE SENTIMIENTO (DEPENDE DE LA CADENA DE COMENTARIOS)
  # =====================================================================================
  fetch_comment_sentiment:
    name: "PASO 4: Analizar Sentimiento de Comentarios"
    runs-on: ubuntu-latest
    needs: reconcile_comments
    if: ${{ needs.reconcile_comments.result == 'success' && (github.event_name != 'schedule' || github.event.schedule == '0 8 * * *') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python ./scripts/fetch_comment_sentiment.py

  # =====================================================================================
  # PASO 5: MÉTRICAS Y TENDENCIAS (INDEPENDIENTES Y EN PARALELO)
  # =====================================================================================
  maint_metrics:
    name: "PASO 5a: Mantener Métricas (Paralelo)"
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '0 9 * * *' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Ejecutar maint_metrics.py con reintentos
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ./scripts/maint_metrics.py
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          SUPABASE_URL_RAW: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - name: Notificar fallo por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow FAILED 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  fetch_video_analytics:
    name: "PASO 5b: Obtener Analíticas (Paralelo)"
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '0 10 * * *' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Ejecutar fetch_video_analytics.py con reintentos
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ./scripts/fetch_video_analytics.py
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          SUPABASE_URL_RAW: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - name: Notificar fallo por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow FAILED 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  compute_posting_schedule:
    name: "PASO 5c: Calcular Horario de Publicación (Paralelo)"
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '30 10 * * *' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Ejecutar compute_posting_schedule.py con reintentos
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ./scripts/compute_posting_schedule.py
        env:
          SUPABASE_URL_RAW: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - name: Notificar fallo por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow FAILED 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  fetch_monetization_metrics:
    name: "PASO 5d: Obtener Métricas de Monetización (Paralelo)"
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '0 11 * * *' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Ejecutar fetch_monetization_metrics.py con reintentos
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ./scripts/fetch_monetization_metrics.py
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          SUPABASE_URL_RAW: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - name: Notificar fallo por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow FAILED 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  fetch_trending_videos:
    name: "PASO 5e: Obtener Videos en Tendencia (No Crítico)"
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '30 11 * * *' }}
    continue-on-error: true
    env:
      REGION_CODES: "PE,MX,AR,CO,CL,ES,US,GB,IN,BR,PT"
      ALLOWED_LANGS: "es,en,hi,pt"
      LONG_MIN_SECONDS: 180
      MAX_SHORTS_PER_DAY: 20
      MAX_LONGS_PER_DAY: 15
      PAGES_PER_REGION: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Ejecutar fetch_trending_videos.py con reintentos
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 20
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ./scripts/fetch_trending_videos.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SUPABASE_URL_RAW: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
      - name: Subir artefacto de reporte
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: trending-report
          path: ./trending_report_*.md
      - name: Notificar fallo por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow FAILED 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  fetch_search_trends:
    name: "PASO 5f: Obtener Tendencias de Búsqueda (Paralelo)"
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '45 11 * * *' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Instalar pytrends
        run: pip install pytrends
      - name: Ejecutar fetch_search_trends.py con reintentos
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ./scripts/fetch_search_trends.py
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          SUPABASE_URL_RAW: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
      - name: Notificar fallo por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow FAILED 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # =====================================================================================
  # JOBS DE MANTENIMIENTO INDEPENDIENTES Y PROGRAMADOS
  # =====================================================================================
  fetch_youtube_policies:
    name: "MANTENIMIENTO: Obtener Políticas de YouTube"
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' && github.event.schedule == '0 14 1,16 * *' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
