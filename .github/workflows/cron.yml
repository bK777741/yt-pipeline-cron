        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run import_recent_comments.py with retry
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: python ./scripts/import_recent_comments.py
        env:
