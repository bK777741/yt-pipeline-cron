# .github/workflows/cron.yml
name: YouTube → Supabase pipeline

# ========= CONFIGURACIÓN GLOBAL DEL WORKFLOW =========
concurrency:
  group: youtube-supabase-${{ github.ref }}
  cancel-in-progress: true

env:
  THUMB_OBJECTS_ENABLED: ${{ vars.THUMB_OBJECTS_ENABLED || 'false' }}
  THUMB_OCR_ENABLED: ${{ vars.THUMB_OCR_ENABLED || 'false' }}
  NICHES_EMBEDDING_ENABLED: ${{ vars.NICHES_EMBEDDING_ENABLED || 'false' }}

# ========= DISPARADORES (TRIGGERS) DEL WORKFLOW =========
on:
  workflow_dispatch:
    inputs:
      only:
        description: "Ejecutar solo este job (opcional)"
        required: false
        type: choice
        options:
          - ""  # vacío = respeta los slots/horarios
          - import_daily
          - import_captions
          - import_recent_comments
          - reconcile_comments
          - maint_metrics
          - fetch_trending_videos
          - refine_trending_with_niche
          - scan_competencia_auto_nicho
          - purge_buffer
          - fetch_comment_sentiment
          - fetch_search_trends
          - fetch_monetization_metrics
          - fetch_video_analytics
          - build_channel_profile
          - build_niche_profile
          - export_sync_watermarks
          - compute_posting_schedule
          - convert_captions_to_script
          - detect_thumbnail_objects
          - extract_thumbnail_text
      force:
        description: "Ignorar checkpoint y ejecutar de todas formas"
        required: false
        default: "false"
        type: choice
        options: ["false","true"]
      persist_checkpoint:
        description: "Guardar checkpoint al terminar"
        required: false
        default: "true"
        type: choice
        options: ["true","false"]
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - '.github/workflows/cron.yml'
      - 'requirements.txt'
      - '*.py'
  schedule:
    # Schedules para jobs originales (UTC)
    - cron: "0 12 * * *"      # import_daily (07:00 Lima)
    - cron: "15 12 * * *"     # import_captions (07:15 Lima)
    - cron: "30 12 * * *"     # import_recent_comments (07:30 Lima)
    - cron: "45 12 * * *"     # reconcile_comments (07:45 Lima)
    - cron: "0 13 * * *"      # fetch_comment_sentiment (08:00 Lima)
    - cron: "0 14 * * *"      # maint_metrics (09:00 Lima)
    - cron: "0 15 * * *"      # fetch_video_analytics (10:00 Lima)
    - cron: "30 15 * * *"     # compute_posting_schedule (10:30 Lima)
    - cron: "0 16 * * *"      # fetch_monetization_metrics (11:00 Lima)
    - cron: "30 16 * * *"     # fetch_trending_videos (11:30 Lima)
    - cron: "45 16 * * *"     # fetch_search_trends (11:45 Lima)
    - cron: "55 9 * * *"      # purge_buffer (04:55 Lima)

    # Schedules para el NUEVO MÓDULO AUTO-NICHO (UTC)
    - cron: "0 10 * * *"      # build_niche_profile (05:00 Lima)
    - cron: "0 11 * * *"      # scan_competencia_auto_nicho (06:00 Lima)
    - cron: "0 18 * * *"      # scan_competencia_auto_nicho (13:00 Lima)
    - cron: "0 2 * * *"       # scan_competencia_auto_nicho (21:00 Lima)

jobs:
  # =====================================================================================
  # PASO 1: IMPORTACIÓN DE DATOS INICIAL (BLOQUE CRÍTICO)
  # =====================================================================================
  import_daily:
    name: "PASO 1: Importar Videos Diarios (Crítico)"
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.only == '' || inputs.only == 'import_daily')) ||
      (github.event_name == 'schedule' && github.event.schedule == '0 12 * * *') ||
      (github.event_name == 'push')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Instalar dependencias del sistema (OCR/OpenCV)
        if: ${{ vars.THUMB_OCR_ENABLED == 'true' || vars.THUMB_OBJECTS_ENABLED == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libgl1
      - name: Instalar dependencias de Python
        run: pip install -r requirements.txt
      - name: Detectar carpeta de scripts
        id: pydir
        run: |
          if [ -d scripts ]; then echo "PYDIR=scripts" >> $GITHUB_OUTPUT; else echo "PYDIR=." >> $GITHUB_OUTPUT; fi
      - name: SLOT (día UTC)
        id: slot
        run: echo "SLOT=$(date -u +%Y-%m-d)" >> $GITHUB_OUTPUT
      - name: Restore checkpoint
        id: cache
        uses: actions/cache@v4
        with:
          path: .checkpoint/import_daily
          key: import-daily-${{ steps.slot.outputs.SLOT }}-${{ github.event.schedule || 'manual' }}
      - name: Skip (ya corrido hoy)
        if: ${{ steps.cache.outputs['cache-hit'] == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.force == 'true') }}
        run: echo "import_daily ya completado hoy para este slot. Skip."
      - name: Run
        if: ${{ steps.cache.outputs['cache-hit'] != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force == 'true') }}
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ${{ steps.pydir.outputs.PYDIR }}/import_daily.py
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          SUPABASE_URL_RAW: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DAILY_VIDEO_BATCH: ${{ secrets.DAILY_VIDEO_BATCH }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          ENABLE_THUMBNAIL_OCR: "true"
      - name: Save checkpoint
        if: ${{ (steps.cache.outputs['cache-hit'] != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force == 'true')) && !(github.event_name == 'workflow_dispatch' && inputs.persist_checkpoint == 'false') }}
        uses: actions/cache/save@v4
        with:
          path: .checkpoint/import_daily
          key: import-daily-${{ steps.slot.outputs.SLOT }}-${{ github.event.schedule || 'manual' }}
      - name: Notificar fallo por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow FAILED 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Revisa los logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # =====================================================================================
  # PASO 2 (PARALELO): PROCESAMIENTO DEPENDIENTE DE LA IMPORTACIÓN
  # =====================================================================================
  import_captions:
    name: "PASO 2a: Importar Subtítulos (Paralelo)"
    runs-on: ubuntu-latest
    needs: import_daily
    if: |
      ( (github.event_name == 'workflow_dispatch' && (inputs.only == '' || inputs.only == 'import_captions')) ||
        (github.event_name == 'schedule' && github.event.schedule == '15 12 * * *') ||
        (github.event_name == 'push')
      ) && (github.event_name == 'workflow_dispatch' || needs.import_daily.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Instalar dependencias de Python
        run: pip install -r requirements.txt
      - name: Detectar carpeta de scripts
        id: pydir
        run: |
          if [ -d scripts ]; then echo "PYDIR=scripts" >> $GITHUB_OUTPUT; else echo "PYDIR=." >> $GITHUB_OUTPUT; fi
      - name: SLOT (día UTC)
        id: slot
        run: echo "SLOT=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
      - name: Restore checkpoint
        id: cache
        uses: actions/cache@v4
        with:
          path: .checkpoint/import_captions
          key: import-captions-${{ steps.slot.outputs.SLOT }}-${{ github.event.schedule || 'manual' }}
      - name: Skip (ya corrido hoy)
        if: ${{ steps.cache.outputs['cache-hit'] == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.force == 'true') }}
        run: echo "import_captions ya completado hoy para este slot. Skip."
      - name: Run
        if: ${{ steps.cache.outputs['cache-hit'] != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force == 'true') }}
        uses: nick-invision/retry@v3
        with:
          max_attempts: 2
          timeout_minutes: 15
          command: |
            set -euo pipefail
            export SUPABASE_URL="$(printf '%s' "$SUPABASE_URL_RAW" | tr -d '\r\n ' | sed 's:/*$::')"
            export SUPABASE_SERVICE_KEY="$(printf '%s' "$SUPABASE_SERVICE_KEY_RAW" | tr -d '\r\n ')"
            python ${{ steps.pydir.outputs.PYDIR }}/import_captions.py
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          SUPABASE_URL_RAW: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_RAW: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - name: Save checkpoint
        if: ${{ (steps.cache.outputs['cache-hit'] != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force == 'true')) && !(github.event_name == 'workflow_dispatch' && inputs.persist_checkpoint == 'false') }}
        uses: actions/cache/save@v4
        with:
          path: .checkpoint/import_captions
          key: import-captions-${{ steps.slot.outputs.SLOT }}-${{ github.event.schedule || 'manual' }}
      - name: Notificar fallo por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          secure: true
          subject: 'YT→Supabase: Workflow FAILED 😱'
          from: jvillarreal0991@gmail.com
          to: ${{ secrets.ALERT_EMAIL }}
          body: |
            Ha fallado el job ${{ github.job }} en el run ${{ github.run_id }}.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  import_recent_comments:
    name: "PASO 2b: Importar Comentarios (Paralelo)"
    runs-on: ubuntu-latest
    needs: import_daily
    if: |
      ( (github.event_name == 'workflow_dispatch' && (inputs.only == '' || inputs.only == 'import_recent_comments')) ||
        (github.event_name == 'schedule' && github.event.schedule == '30 12 * * *') ||
        (github.event_name == 'push')
      ) && (github.event_name == 'workflow_dispatch' || needs.import_daily.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Instalar dependencias de Python
        run: pip install -r requirements.txt
      - name: Detectar carpeta de scripts
        id: pydir
        run: |
          if [ -d scripts ]; then echo "PYDIR=scripts" >> $GITHUB_OUTPUT; else echo "PYDIR=." >> $GITHUB_OUTPUT; fi
      - name: SLOT (día UTC)
        id: slot
        run: echo "SLOT=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
      - name: Restore checkpoint
        id: cache
        uses: actions/cache@v4
        with:
          path: .checkpoint/import_recent_comments
          key: import-recent-comments-${{ steps.slot.outputs.SLOT }}-${{ github.event.schedule || 'manual' }}
      - name: Skip (ya corrido hoy)
        if: ${{ steps.cache.outputs['cache-hit'] == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.force == 'true') }}
        run: echo "import_recent_comments ya completado hoy para este slot. Skip."
      - name: Run
        if: ${{ steps.cache.outputs['cache-hit'] != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force == 'true') }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRECH_TOKEN }}
          MAX_VIDEOS_PER_RUN: 50
          MAX_COMMENTS_PER_VIDEO: 500
        run: python ${{ steps.pydir.outputs.PYDIR }}/import_recent_comments.py
      - name: Save checkpoint
        if: ${{ (steps.cache.outputs['cache-hit'] != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force == 'true')) && !(github.event_name == 'workflow_dispatch' && inputs.persist_checkpoint == 'false') }}
        uses: actions/cache/save@v4
        with:
          path: .checkpoint/import_recent_comments
          key: import-recent-comments-${{ steps.slot.outputs.SLOT }}-${{ github.event.schedule || 'manual' }}

  detect_thumbnail_objects:
    name: "PASO 2c: Detectar Objetos en Thumbnails (Paralelo)"
    runs-on: ubuntu-latest
    needs: import_daily
    if: |
      ( (github.event_name == 'workflow_dispatch' && (inputs.only == '' || inputs.only == 'detect_thumbnail_objects')) ||
        (github.event_name == 'schedule' && github.event.schedule == '0 12 * * *') ||
        (github.event_name == 'push')
      ) && (vars.THUMB_OBJECTS_ENABLED == 'true') && (github.event_name == 'workflow_dispatch' || needs.import_daily.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Instalar dependencias de Python
        run: pip install -r requirements.txt
      - name: Detectar carpeta de scripts
        id: pydir
        run: |
          if [ -d scripts ]; then echo "PYDIR=scripts" >> $GITHUB_OUTPUT; else echo "PYDIR=." >> $GITHUB_OUTPUT; fi
      - name: SLOT (día UTC)
        id: slot
        run: echo "SLOT=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
      - name: Restore checkpoint
        id: cache
        uses: actions/cache@v4
        with:
          path: .checkpoint/detect_thumbnail_objects
          key: detect-thumbnail-objects-${{ steps.slot.outputs.SLOT }}-${{ github.event.schedule || 'manual' }}
      - name: Skip (ya corrido hoy)
        if: ${{ steps.cache.outputs['cache-hit'] == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.force == 'true') }}
        run: echo "detect_thumbnail_objects ya completado hoy para este slot. Skip."
      - name: Run
        if: ${{ steps.cache.outputs['cache-hit'] != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force == 'true') }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python ${{ steps.pydir.outputs.PYDIR }}/detect_thumbnail_objects.py
      - name: Save checkpoint
        if: ${{ (steps.cache.outputs['cache-hit'] != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force == 'true')) && !(github.event_name == 'workflow_dispatch' && inputs.persist_checkpoint == 'false') }}
        uses: actions/cache/save@v4
        with:
          path: .checkpoint/detect_thumbnail_objects
          key: detect-thumbnail-objects-${{ steps.slot.outputs.SLOT }}-${{ github.event.schedule || 'manual' }}

  extract_thumbnail_text:
    name: "PASO 2d: Extraer Texto de Thumbnails (Paralelo)"
    runs-on: ubuntu-latest
    needs: import_daily
    if: |
      ( (github.event_name == 'workflow_dispatch' && (inputs.only == '' || inputs.only == 'extract_thumbnail_text')) ||
        (github.event_name == 'schedule' && github.event.schedule == '0 12 * * *') ||
        (github.event_name == 'push')
      ) && (vars.THUMB_OCR_ENABLED == 'true') && (github.event_name == 'workflow_dispatch' || needs.import_daily.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Instalar dependencias de Python
        run: pip install -r requirements.txt
      - name: Detectar carpeta de scripts
        id: pydir
        run: |
          if [ -d scripts ]; then echo "PYDIR=scripts" >> $GITHUB_OUTPUT; else echo "PYDIR=." >> $GITHUB_OUTPUT; fi
      - name: SLOT (día UTC)
        id: slot
        run: echo "SLOT=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
      - name: Restore checkpoint
        id: cache
        uses: actions/cache@v4
        with:
          path: .checkpoint/extract_thumbnail_text
          key: extract-thumbnail-text-${{ steps.slot.outputs.SLOT }}-${{ github.event.schedule || 'manual' }}
      - name: Skip (ya corrido hoy)
        if: ${{ steps.cache.outputs['cache-hit'] == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.force == 'true') }}
        run: echo "extract_thumbnail_text ya completado hoy para este slot. Skip."
      - name: Run
        if: ${{ steps.cache.outputs['cache-hit'] != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force == 'true') }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python ${{ steps.pydir.outputs.PYDIR }}/extract_thumbnail_text.py
      - name: Save checkpoint
        if: ${{ (steps.cache.outputs['cache-hit'] != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force == 'true')) && !(github.event_name == 'workflow_dispatch' && inputs.persist_checkpoint == 'false') }}
        uses: actions/cache/save@v4
        with:
          path: .checkpoint/extract_thumbnail_text
          key: extract-thumbnail-text-${{ steps.slot.outputs.SLOT }}-${{ github.event.schedule || 'manual' }}

  # =====================================================================================
  # PASO 3: PROCESAMIENTO SECUNDARIO (DEPENDENCIAS EN CADENA)
  # =====================================================================================
  convert_captions_to_script:
    name: "PASO 3a: Convertir Subtítulos a Guion"
    runs-on: ubuntu-latest
    needs: import_captions
    if: |
      ( (github.event_name == 'workflow_dispatch' && (inputs.only == '' || inputs.only == 'convert_captions_to_script')) ||
        (github.event_name == 'schedule' && github.event.schedule == '15 12 * * *') ||
        (github.event_name == 'push')
      ) && (github.event_name == 'workflow_dispatch' || needs.import_captions.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Instalar dependencias de Python
        run: pip install -r requirements.txt
      - name: Detectar carpeta de scripts
        id: pydir
        run: |
          if [ -d scripts ]; then echo "PYDIR=scripts" >> $GITHUB_OUTPUT; else echo "PYDIR=." >> $GITHUB_OUTPUT; fi
      - name: SLOT (día UTC)
        id: slot
        run: echo "SLOT=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
      - name: Restore checkpoint
        id: cache
        uses: actions/cache@v4
        with:
          path: .checkpoint/convert_captions_to_script
          key: convert-captions-to-script-${{ steps.slot.outputs.SLOT }}-${{ github.event.schedule || 'manual' }}
      - name: Skip (ya corrido hoy)
        if: ${{ steps.cache.outputs['cache-hit'] == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.force == 'true') }}
        run: echo "convert_captions_to_script ya completado hoy para este slot. Skip."
      - name: Run
        if: ${{ steps.cache.outputs['cache-hit'] != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force == 'true') }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python ${{ steps.pydir.outputs.PYDIR }}/convert_captions_to_script.py
      - name: Save checkpoint
        if: ${{ (steps.cache.outputs['cache-hit'] != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force == 'true')) && !(github.event_name == 'workflow_dispatch' && inputs.persist_checkpoint == 'false') }}
        uses: actions/cache/save@v4
        with:
          path: .checkpoint/convert_captions_to_script
          key: convert-captions-to-script-${{ steps.slot.outputs.SLOT }}-${{ github.event.schedule || 'manual' }}

  reconcile_comments:
    name: "PASO 3b: Reconciliar Comentarios"
    runs-on: ubuntu-latest
    needs: import_recent_comments
    if: |
      ( (github.event_name == 'workflow_dispatch' && (inputs.only == '' || inputs.only == 'reconcile_comments')) ||
        (github.event_name == 'schedule' && github.event.schedule == '45 12 * * *') ||
        (github.event_name == 'push')
      ) && (github.event_name == 'workflow_dispatch' || needs.import_recent_comments.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Instalar dependencias de Python
        run: pip install -r requirements.txt
      - name: Detectar carpeta de scripts
        id: pydir
        run: |
          if [ -d scripts ]; then echo "PYDIR=scripts" >> $GITHUB_OUTPUT; else echo "PYDIR=." >> $GITHUB_OUTPUT; fi
      - name: SLOT (día UTC)
        id: slot
        run: echo "SLOT=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
      - name: Restore checkpoint
        id: cache
        uses: actions/cache@v4
        with:
          path: .checkpoint/reconcile_comments
          key: reconcile-comments-${{ steps.slot.outputs.SLOT }}-${{ github.event.schedule || 'manual' }}
      - name: Skip (ya corrido hoy)
        if: ${{ steps.cache.outputs['cache-hit'] == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.force == 'true') }}
        run: echo "reconcile_comments ya completado hoy para este slot. Skip."
      - name: Run
        if: ${{ steps.cache.outputs['cache-hit'] != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force == 'true') }}
        run: python ${{ steps.pydir.outputs.PYDIR }}/reconcile_comments.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
      - name: Save checkpoint
        if: ${{ (steps.cache.outputs['cache-hit'] != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force == 'true')) && !(github.event_name == 'workflow_dispatch' && inputs.persist_checkpoint == 'false') }}
        uses: actions/cache/save@v4
        with:
          path: .checkpoint/reconcile_comments
          key: reconcile-comments-${{ steps.slot.outputs.SLOT }}-${{ github.event.schedule || 'manual' }}

  # =====================================================================================
  # PASO 4: ANÁLISIS DE SENTIMIENTO (DEPENDE DE LA CADENA DE COMENTARIOS)
  # =====================================================================================
  fetch_comment_sentiment:
    name: "PASO 4: Analizar Sentimiento de Comentarios"
    runs-on: ubuntu-latest
    needs: reconcile_comments
    if: |
