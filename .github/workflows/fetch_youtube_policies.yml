name: Fetch YouTube policies (quincenal)

on:
  workflow_dispatch:
  schedule:
    # 06:00 Lima (UTC-5) los días 1 y 15 -> 11:00 UTC
    - cron: "0 11 1,15 * *"

permissions:
  contents: read

concurrency:
  group: fetch-youtube-policies-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fetch_youtube_policies:
    name: Scrape & upsert policies
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show commit & script fingerprint
        run: |
          set -euo pipefail
          echo "[GIT] HEAD SHA:" $(git rev-parse HEAD)
          echo "[FILE] path:"
          python - <<'PY'
import os, hashlib
p = "scripts/fetch_youtube_policies.py"
print(os.path.abspath(p))
with open(p, "rb") as f:
    b = f.read()
print("[FILE] sha256:", hashlib.sha256(b).hexdigest())
print("[FILE] head:")
print("".join(line for i, line in zip(range(1, 80), open(p, "r", encoding="utf-8"))))
PY
      - name: Smoke test write to Supabase (insert & delete a probe row)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -euo pipefail
          # Normalizar SUPABASE_URL: quitar CR/LF y barras finales; añadir https:// si falta
          RAW="${SUPABASE_URL}"
          BASE="$(printf '%s' "$RAW" | tr -d '\r\n' | sed -E 's#/*$##')"
          case "$BASE" in
            http://*|https://*) : ;;
            *) BASE="https://${BASE}";;
          esac

          HOST="$(printf '%s' "$BASE" | sed -E 's#https?://([^/]+)/?.*#\1#')"
          echo "[SMOKE] Host: ${HOST}"
          echo "[SMOKE] Using base: ${BASE}"  # GitHub lo enmascara, es normal ver ***

          json='[{"policy_url":"https://example.com/__probe__",
                  "category":"probe",
                  "content_text":"probe row",
                  "content_hash":"probehash",
                  "fetched_at":"'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
                  "last_checked_at":"'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"}]'

          echo "[SMOKE] Inserting probe row…"
          curl -sS -o /tmp/ins.json -w "\nHTTP %{http_code}\n" \
            "${BASE}/rest/v1/youtube_policies" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "${json}"

          echo "[SMOKE] Count after insert:"
          curl -sS "${BASE}/rest/v1/youtube_policies?select=count" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}"
          echo

          echo "[SMOKE] Deleting probe row…"
          curl -sS -o /tmp/del.json -w "\nHTTP %{http_code}\n" \
            "${BASE}/rest/v1/youtube_policies?policy_url=eq.https://example.com/__probe__" \
            -X DELETE \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}"
            
      - name: Run fetch_youtube_policies.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          POLICY_MAX_CHARS: "12000"
        run: |
          set -euo pipefail
          python -u ./scripts/fetch_youtube_policies.py
