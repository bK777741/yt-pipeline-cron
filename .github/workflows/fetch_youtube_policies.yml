name: Fetch YouTube policies (quincenal)

on:
  workflow_dispatch:
  schedule:
    # 06:00 Lima (UTC-5) los días 1 y 15 -> 11:00 UTC
    - cron: "0 11 1,15 * *"

permissions:
  contents: read

concurrency:
  group: fetch-youtube-policies-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fetch_youtube_policies:
    name: Scrape & upsert policies
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug policy_urls.json (raw)
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path("scripts/policy_urls.json")
          b = p.read_bytes()
          print("BYTES:", len(b))
          print("RAW (show non-printables as \\x..):")
          print("".join(c if 32 <= ord(c) < 127 else f"\\x{ord(c):02x}" for c in b.decode("utf-8", "ignore")))
          import json
          data = json.loads(b.decode("utf-8-sig"))
          for i, s in enumerate(data, 1):
              print(i, repr(s), [ord(ch) for ch in s if ord(ch) < 32])
          PY
      
      - name: Run fetch_youtube_policies.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          POLICY_MAX_CHARS: "12000"
        run: |
          set -euo pipefail
          python -u ./scripts/fetch_youtube_policies.py
