name: Fetch YouTube policies (quincenal)

on:
  workflow_dispatch:
  schedule:
    # 06:00 Lima (UTC-5) los días 1 y 15 -> 11:00 UTC
    - cron: "0 11 1,15 * *"

permissions:
  contents: read

concurrency:
  group: fetch-youtube-policies-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fetch_youtube_policies:
    name: Scrape & upsert policies
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fetch_youtube_policies.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

          # Usa una cadena de texto sin saltos de línea y separada por comas.
          # El script de Python la procesará correctamente.
          POLICY_URLS: "https://support.google.com/youtube/answer/9288567?hl=en, https://support.google.com/youtube/answer/6162278?hl=en, https://support.google.com/youtube/answer/2797466?hl=en, https://support.google.com/youtube/answer/72851?hl=en, https://support.google.com/youtube/answer/1311392?hl=en, https://support.google.com/youtube/answer/2802032?hl=en, https://support.google.com/youtube/answer/9725604?hl=en"
          
          # Correo de contacto para el User-Agent (opcional pero recomendado)
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}

          # Máximo de caracteres por página (opcional)
          POLICY_MAX_CHARS: "12000"
        run: |
          set -euo pipefail
          python -u ./scripts/fetch_youtube_policies.py
